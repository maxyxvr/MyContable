<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyContable — Acceso</title>
    <meta name="description" content="Portal de acceso seguro a MyContable, tu sistema contable profesional." />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="js/auth.js"></script>
    <style>
        :root {
            --blue-deep: #0a1628;
            --blue-mid:  #0f2952;
            --accent:    #3b82f6;
            --accent2:   #6366f1;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--blue-deep);
            overflow: hidden;
        }

        /* ── Animated gradient orbs ── */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: .55;
            animation: drift 18s ease-in-out infinite alternate;
        }
        .orb-1 { width: 520px; height: 520px; background: #1d4ed8; top: -160px; left: -140px; animation-delay: 0s; }
        .orb-2 { width: 420px; height: 420px; background: #4f46e5; bottom: -120px; right: -100px; animation-delay: -6s; }
        .orb-3 { width: 300px; height: 300px; background: #0ea5e9; top: 40%; left: 55%; animation-delay: -12s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }

        /* ── Card ── */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            margin: 1.5rem;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 24px;
            padding: 2.5rem 2.25rem;
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow: 0 32px 64px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12);
            animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Logo badge ── */
        .logo-badge {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(59,130,246,.45);
            margin-bottom: 1.5rem;
        }
        .logo-badge span { color: #fff; font-size: 1.75rem; }

        /* ── Heading ── */
        .card-title {
            font-family: 'Manrope', sans-serif;
            font-size: 1.65rem;
            font-weight: 800;
            color: #fff;
            margin: 0 0 .25rem;
        }
        .card-sub {
            font-size: .85rem;
            color: rgba(255,255,255,.45);
            margin: 0 0 2rem;
        }

        /* ── Form fields ── */
        .field-label {
            display: block;
            font-size: .75rem;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            color: rgba(255,255,255,.5);
            margin-bottom: .4rem;
        }
        .field-wrap {
            position: relative;
            margin-bottom: 1.1rem;
        }
        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,.35);
            font-size: 1.1rem;
            pointer-events: none;
        }
        .field-input {
            width: 100%;
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 12px;
            color: #fff;
            font-size: .95rem;
            padding: .75rem .9rem .75rem 2.6rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s, background .2s;
            font-family: 'Inter', sans-serif;
        }
        .field-input::placeholder { color: rgba(255,255,255,.28); }
        .field-input:focus {
            border-color: #3b82f6;
            background: rgba(59,130,246,.08);
            box-shadow: 0 0 0 3px rgba(59,130,246,.22);
        }
        /* toggle password button */
        .btn-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,.35);
            font-size: 1.1rem;
            padding: 0;
            display: flex;
            transition: color .15s;
        }
        .btn-eye:hover { color: rgba(255,255,255,.75); }

        /* ── Error banner ── */
        .error-banner {
            display: none;
            align-items: center;
            gap: .5rem;
            background: rgba(239,68,68,.15);
            border: 1px solid rgba(239,68,68,.35);
            border-radius: 10px;
            padding: .6rem .9rem;
            color: #fca5a5;
            font-size: .85rem;
            margin-bottom: 1.2rem;
            animation: shake .35s ease;
        }
        .error-banner.visible { display: flex; }
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-6px)}
            40%{transform:translateX(6px)}
            60%{transform:translateX(-4px)}
            80%{transform:translateX(4px)}
        }

        /* ── Submit ── */
        .btn-login {
            width: 100%;
            padding: .8rem;
            border-radius: 12px;
            border: none;
            font-family: 'Manrope', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
            color: #fff;
            box-shadow: 0 6px 20px rgba(59,130,246,.45);
            transition: opacity .2s, transform .15s, box-shadow .2s;
            letter-spacing: .02em;
        }
        .btn-login:hover {
            opacity: .92;
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(59,130,246,.55);
        }
        .btn-login:active { transform: translateY(0); opacity: 1; }
        .btn-login:disabled { opacity: .55; cursor: not-allowed; transform: none; }

        /* ── Spinner inside button ── */
        .spinner {
            display: none;
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Footer ── */
        .card-footer {
            margin-top: 1.75rem;
            text-align: center;
            font-size: .75rem;
            color: rgba(255,255,255,.25);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body>

    <!-- Animated background -->
    <div class="bg-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Login Card -->
    <div class="login-card" role="main">
        <div class="logo-badge" aria-hidden="true">
            <span class="material-symbols-outlined">account_balance</span>
        </div>

        <h1 class="card-title">MyContable</h1>
        <p class="card-sub">Ingresa tus credenciales para continuar</p>

        <div id="error-banner" class="error-banner" role="alert" aria-live="polite">
            <span class="material-symbols-outlined" style="font-size:1rem">error</span>
            <span id="error-msg">Usuario o contraseña incorrectos.</span>
        </div>

        <form id="login-form" novalidate autocomplete="off">

            <!-- Usuario -->
            <label class="field-label" for="username">Usuario</label>
            <div class="field-wrap">
                <span class="material-symbols-outlined field-icon">person</span>
                <input
                    id="username"
                    class="field-input"
                    type="text"
                    placeholder="Nombre de usuario"
                    autocomplete="username"
                    required
                />
            </div>

            <!-- Contraseña -->
            <label class="field-label" for="password">Contraseña</label>
            <div class="field-wrap">
                <span class="material-symbols-outlined field-icon">lock</span>
                <input
                    id="password"
                    class="field-input"
                    type="password"
                    placeholder="••••••••"
                    autocomplete="current-password"
                    required
                />
                <button type="button" class="btn-eye" id="toggle-pass" aria-label="Mostrar contraseña">
                    <span class="material-symbols-outlined" id="eye-icon">visibility</span>
                </button>
            </div>

            <button type="submit" class="btn-login" id="btn-submit">
                <span id="btn-label">Iniciar sesión</span>
                <div id="btn-spinner" class="spinner"></div>
            </button>
        </form>

        <p class="card-footer">
            <span class="material-symbols-outlined" style="font-size:.85rem;vertical-align:middle">shield</span>
            Acceso protegido · MyContable &copy; 2025
        </p>
    </div>

    <script>
        // Redirect if already logged in
        if (Auth.isAuthenticated()) {
            location.replace('index.html');
        }

        // Toggle password visibility
        document.getElementById('toggle-pass').addEventListener('click', () => {
            const inp = document.getElementById('password');
            const icon = document.getElementById('eye-icon');
            if (inp.type === 'password') {
                inp.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                inp.type = 'password';
                icon.textContent = 'visibility';
            }
        });

        // Form submit
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const banner = document.getElementById('error-banner');
            const btnLabel = document.getElementById('btn-label');
            const spinner = document.getElementById('btn-spinner');
            const btn = document.getElementById('btn-submit');

            // Show spinner
            btnLabel.style.display = 'none';
            spinner.style.display = 'block';
            btn.disabled = true;
            banner.classList.remove('visible');

            // Slight delay for UX polish
            setTimeout(() => {
                if (Auth.login(user, pass)) {
                    // Success → go to app
                    location.replace('index.html');
                } else {
                    // Failure
                    spinner.style.display = 'none';
                    btnLabel.style.display = 'block';
                    btn.disabled = false;
                    banner.classList.add('visible');
                    // Shake the card
                    const card = document.querySelector('.login-card');
                    card.style.animation = 'none';
                    requestAnimationFrame(() => { card.style.animation = ''; });
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            }, 600);
        });
    </script>
</body>
</html>
