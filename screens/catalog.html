<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyContable — Catálogo</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="../js/db.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/nav.js"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f7f9fb
        }

        .label {
            display: block;
            font-size: .75rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: .05em
        }

        .inp {
            width: 100%;
            padding: 10px 14px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: .875rem;
            outline: none;
            transition: border .15s
        }

        .inp:focus {
            border-color: #00236f
        }
    </style>
</head>

<body class="min-h-screen">
    <main class="max-w-screen-xl mx-auto px-6 py-10">
        <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
            <h1 class="text-3xl font-extrabold text-blue-900" style="font-family:Manrope">Catálogo de Productos</h1>
            <div class="flex gap-3">
                <div class="relative"><span
                        class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-sm">search</span><input
                        id="search" type="text"
                        class="pl-9 pr-4 py-2 bg-white border border-slate-200 rounded-full text-sm w-52 focus:outline-none focus:ring-2 focus:ring-blue-900"
                        placeholder="Buscar SKU o nombre..."></div>
                <button onclick="openModal()"
                    class="flex items-center gap-2 px-5 py-2 bg-blue-900 text-white rounded-full text-sm font-bold shadow-md hover:bg-blue-800"><span
                        class="material-symbols-outlined text-sm">add</span> Nuevo</button>
            </div>
        </div>
        <div class="flex gap-2 mb-8">
            <button onclick="setFilter('all')" id="f-all"
                class="px-4 py-1.5 bg-blue-900 text-white rounded-full text-xs font-bold uppercase">Todos</button>
            <button onclick="setFilter('product')" id="f-product"
                class="px-4 py-1.5 bg-white text-slate-500 rounded-full text-xs font-bold uppercase border border-slate-200">Productos</button>
            <button onclick="setFilter('service')" id="f-service"
                class="px-4 py-1.5 bg-white text-slate-500 rounded-full text-xs font-bold uppercase border border-slate-200">Servicios</button>
        </div>
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>
        <p id="empty" class="hidden text-center text-slate-400 py-16">No hay productos registrados.</p>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-lg p-8">
            <h2 id="modal-title" class="text-xl font-bold text-blue-900 mb-6" style="font-family:Manrope">Nuevo Producto
            </h2>
            <form id="form" class="space-y-4">
                <input type="hidden" id="f-id" />
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2"><label class="label">Nombre *</label><input id="f-name" required class="inp"
                            placeholder="Nombre del producto o servicio" /></div>
                    <div><label class="label">SKU / Referencia</label><input id="f-sku" class="inp"
                            placeholder="PRD-001" /></div>
                    <div><label class="label">Tipo *</label><select id="f-type" class="inp">
                            <option value="product">Producto</option>
                            <option value="service">Servicio</option>
                        </select></div>
                    <div><label class="label">Precio de Venta *</label><input id="f-price" type="number" required
                            class="inp" placeholder="0" /></div>
                    <div><label class="label">Costo</label><input id="f-cost" type="number" class="inp"
                            placeholder="0" /></div>
                    <div id="stock-wrap" class="col-span-2"><label class="label">Stock disponible</label><input
                            id="f-stock" type="number" class="inp" placeholder="0" /></div>
                    <div class="col-span-2"><label class="label">Descripción</label><textarea id="f-desc"
                            class="inp min-h-[70px]" placeholder="Descripción breve..."></textarea></div>
                </div>
                <div class="flex gap-3 justify-end pt-2">
                    <button type="button" onclick="closeModal()"
                        class="px-5 py-2 rounded-full border border-slate-200 text-slate-600 text-sm font-medium hover:bg-slate-50">Cancelar</button>
                    <button type="submit"
                        class="px-6 py-2 bg-blue-900 text-white rounded-full text-sm font-bold hover:bg-blue-800">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let filter = 'all';
        function setFilter(f) {
            filter = f;
            ['all', 'product', 'service'].forEach(k => {
                const el = document.getElementById('f-' + k);
                el.className = k === f
                    ? 'px-4 py-1.5 bg-blue-900 text-white rounded-full text-xs font-bold uppercase'
                    : 'px-4 py-1.5 bg-white text-slate-500 rounded-full text-xs font-bold uppercase border border-slate-200';
            });
            render();
        }
        function render() {
            const q = document.getElementById('search').value;
            let list = q ? Products.search(q) : Products.all();
            if (filter !== 'all') list = list.filter(p => p.type === filter);
            const grid = document.getElementById('grid');
            const empty = document.getElementById('empty');
            if (!list.length) { grid.innerHTML = ''; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            grid.innerHTML = list.map(p => {
                const lowStock = p.type === 'product' && p.stock !== null && Number(p.stock) < 10;
                const stockBadge = p.type === 'service'
                    ? `<span class="text-xs font-semibold text-blue-600">Servicio</span>`
                    : lowStock
                        ? `<span class="text-xs font-semibold text-amber-600">Stock: ${p.stock} uds.</span>`
                        : `<span class="text-xs font-semibold text-emerald-600">Stock: ${p.stock} uds.</span>`;
                const icon = p.type === 'service' ? 'design_services' : 'inventory_2';
                return `
      <div class="bg-white rounded-2xl shadow-sm overflow-hidden group hover:shadow-md transition-all">
        <div class="h-36 bg-slate-50 flex items-center justify-center group-hover:bg-blue-50 transition-colors">
          <span class="material-symbols-outlined text-5xl text-slate-200 group-hover:text-blue-100 transition-colors">${icon}</span>
        </div>
        <div class="p-5">
          <p class="text-[10px] text-slate-400 font-mono uppercase mb-1">${p.sku || '—'}</p>
          <h3 class="font-bold text-blue-900 leading-tight mb-1">${p.name}</h3>
          <p class="text-xs text-slate-400 mb-4 line-clamp-2">${p.desc || ''}</p>
          <div class="flex justify-between items-end mb-3">
            <div><p class="text-[10px] text-slate-400">Precio venta</p><p class="font-extrabold text-blue-900">${fmt(p.price)}</p></div>
            <div class="text-right"><p class="text-[10px] text-slate-400">Costo</p><p class="font-semibold text-slate-500">${fmt(p.cost)}</p></div>
          </div>
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-1.5">${stockBadge}</div>
            <div class="flex gap-1">
              <button onclick="edit('${p.id}')" class="p-1.5 rounded-full hover:bg-slate-100 transition-colors"><span class="material-symbols-outlined text-slate-400 text-sm">edit</span></button>
              <button onclick="del('${p.id}')" class="p-1.5 rounded-full hover:bg-red-50 transition-colors"><span class="material-symbols-outlined text-red-400 text-sm">delete</span></button>
            </div>
          </div>
        </div>
      </div>`;
            }).join('');
        }
        function openModal(data) {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-title').textContent = data ? 'Editar Producto' : 'Nuevo Producto';
            ['id', 'name', 'sku', 'type', 'price', 'cost', 'stock', 'desc'].forEach(k => {
                const el = document.getElementById('f-' + k); if (el) el.value = data ? (data[k] ?? '') : '';
            });
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function edit(id) { openModal(Products.byId(id)); }
        function del(id) { confirm('¿Eliminar este producto?', () => { Products.delete(id); render(); showToast('Eliminado'); }); }
        document.getElementById('form').addEventListener('submit', e => {
            e.preventDefault();
            const data = {
                id: document.getElementById('f-id').value || undefined,
                name: document.getElementById('f-name').value,
                sku: document.getElementById('f-sku').value,
                type: document.getElementById('f-type').value,
                price: Number(document.getElementById('f-price').value),
                cost: Number(document.getElementById('f-cost').value),
                stock: document.getElementById('f-stock').value !== '' ? Number(document.getElementById('f-stock').value) : null,
                desc: document.getElementById('f-desc').value,
            };
            if (!data.id) delete data.id;
            Products.save(data);
            closeModal(); render(); showToast('Producto guardado');
        });
        document.getElementById('search').addEventListener('input', render);
        render();
    </script>
</body>

</html>
