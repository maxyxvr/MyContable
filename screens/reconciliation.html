<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>MyContable — Conciliación Bancaria</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="../js/auth.js"></script>
    <script src="../js/db.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/nav.js"></script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f7f9fb
        }

        .label {
            display: block;
            font-size: .7rem;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 4px;
            text-transform: uppercase
        }

        .inp {
            width: 100%;
            padding: 9px 12px;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: .875rem;
            outline: none;
            transition: border .15s
        }

        .inp:focus {
            border-color: #00236f
        }
    </style>
</head>

<body class="min-h-screen">
    <main class="max-w-screen-xl mx-auto px-6 py-10">
        <div class="flex justify-between items-center mb-8 flex-wrap gap-4">
            <h1 class="text-3xl font-extrabold text-blue-900" style="font-family:Manrope">Conciliación Bancaria</h1>
            <button onclick="openModal()"
                class="flex items-center gap-2 px-5 py-2 bg-blue-900 text-white rounded-full text-sm font-bold hover:bg-blue-800">
                <span class="material-symbols-outlined text-sm">add</span> Movimiento
            </button>
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10" id="kpis"></div>

        <!-- Movements -->
        <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center">
                <h2 class="font-bold text-blue-900">Movimientos Bancarios</h2>
                <span class="text-xs text-slate-400">Clic en ✓ para conciliar</span>
            </div>
            <div id="list" class="divide-y divide-slate-100"></div>
            <p id="empty" class="hidden text-slate-400 text-center py-14">Sin movimientos. Agrega el primero.</p>
        </div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black/50 z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">
            <h2 class="text-xl font-bold text-blue-900 mb-6" style="font-family:Manrope">Nuevo Movimiento</h2>
            <form id="form" class="space-y-4">
                <div><label class="label">Descripción *</label><input id="f-desc" required class="inp"
                        placeholder="Ej. Transferencia entrada cliente" /></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="label">Fecha</label><input id="f-date" type="date" class="inp" /></div>
                    <div><label class="label">Tipo</label><select id="f-type" class="inp">
                            <option value="credit">Crédito (+)</option>
                            <option value="debit">Débito (−)</option>
                        </select></div>
                </div>
                <div><label class="label">Monto *</label><input id="f-amount" type="number" required min="0" step="1"
                        class="inp" placeholder="0" /></div>
                <div class="flex gap-3 justify-end pt-2">
                    <button type="button" onclick="closeModal()"
                        class="px-5 py-2 rounded-full border border-slate-200 text-slate-600 text-sm font-medium">Cancelar</button>
                    <button type="submit"
                        class="px-6 py-2 bg-blue-900 text-white rounded-full text-sm font-bold">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        Auth.requireAuth();
        function render() {
            const moves = BankMoves.all().sort((a, b) => b.date > a.date ? 1 : -1);
            const kpiEl = document.getElementById('kpis');
            const matched = moves.filter(m => m.matched);
            const unmatched = moves.filter(m => !m.matched);
            const bankBalance = moves.reduce((s, m) => s + (m.type === 'credit' ? 1 : -1) * Math.abs(Number(m.amount) || 0), 0);
            const diff = moves.filter(m => !m.matched).reduce((s, m) => s + (m.type === 'credit' ? 1 : -1) * Math.abs(Number(m.amount) || 0), 0);
            kpiEl.innerHTML = `
    <div class="bg-white p-6 rounded-2xl shadow-sm"><p class="text-xs text-slate-400 uppercase font-bold tracking-widest mb-1">Saldo Banco</p><p class="text-3xl font-extrabold text-blue-900">${fmt(bankBalance)}</p></div>
    <div class="bg-white p-6 rounded-2xl shadow-sm"><p class="text-xs text-slate-400 uppercase font-bold tracking-widest mb-1">Sin Conciliar</p><p class="text-3xl font-extrabold ${unmatched.length ? 'text-amber-600' : 'text-emerald-600'}">${unmatched.length}</p></div>
    <div class="${Math.abs(diff) < 1 ? 'bg-emerald-50 border-emerald-100' : 'bg-amber-50 border-amber-100'} p-6 rounded-2xl shadow-sm border">
      <p class="text-xs uppercase font-bold tracking-widest mb-1 ${Math.abs(diff) < 1 ? 'text-emerald-600' : 'text-amber-600'}">Diferencia</p>
      <p class="text-3xl font-extrabold ${Math.abs(diff) < 1 ? 'text-emerald-700' : 'text-amber-700'}">${Math.abs(diff) < 1 ? '✓ Cuadrado' : fmt(Math.abs(diff))}</p>
    </div>`;
            const listEl = document.getElementById('list');
            const empty = document.getElementById('empty');
            if (!moves.length) { listEl.innerHTML = ''; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            listEl.innerHTML = moves.map(m => `
    <div class="px-6 py-4 flex items-center gap-4 ${m.matched ? 'bg-emerald-50/40' : 'hover:bg-slate-50'} transition-colors">
      <button onclick="toggleMatch('${m.id}')" class="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 transition-colors ${m.matched ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-400 hover:bg-emerald-100 hover:text-emerald-600'}">
        <span class="material-symbols-outlined text-sm">check</span>
      </button>
      <div class="flex-1">
        <p class="font-semibold text-sm ${m.matched ? 'text-slate-500 line-through' : ''}">${m.description}</p>
        <p class="text-xs text-slate-400">${fmtDate(m.date)}</p>
      </div>
      <span class="font-extrabold ${m.type === 'credit' ? 'text-emerald-600' : 'text-red-500'}">${m.type === 'credit' ? '+' : '-'}${fmt(Math.abs(Number(m.amount)))}</span>
      <button onclick="delMove('${m.id}')" class="p-1.5 text-slate-200 hover:text-red-500"><span class="material-symbols-outlined text-sm">delete</span></button>
    </div>`).join('');
        }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function toggleMatch(id) { BankMoves.toggle(id); render(); }
        function delMove(id) { confirm('¿Eliminar movimiento?', () => { BankMoves.delete(id); render(); showToast('Eliminado'); }); }
        document.getElementById('form').addEventListener('submit', e => {
            e.preventDefault();
            BankMoves.save({
                description: document.getElementById('f-desc').value,
                date: document.getElementById('f-date').value,
                type: document.getElementById('f-type').value,
                amount: Number(document.getElementById('f-amount').value),
            });
            closeModal(); document.getElementById('form').reset(); document.getElementById('f-date').value = today();
            render(); showToast('Movimiento agregado');
        });
        render();
    </script>
</body>

</html>
